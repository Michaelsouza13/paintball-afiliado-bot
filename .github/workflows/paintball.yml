name: Paintball Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Restaurar cache de ofertas enviadas
        uses: actions/cache@v4
        with:
          path: cache/
          key: paintball-cache-${{ github.run_id }}
          restore-keys: paintball-cache-
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Executar bot
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          ML_CATEGORY: "MLB1276"
          ML_PAGES: "3"
          ML_MAX_PAGES: "15"
          MAX_OFFERS_PER_RUN: "10"
          SEND_DELAY_SECONDS: "30"
          ML_KEYWORDS: "paintball,marcador paintball,mascara paintball,bola paintball,bolinha paintball,equipamento paintball,kit paintball,carregador paintball,cilindro co2,calca paintball,luva paintball,colete paintball,gatilho paintball,aguia paintball,spyder,tippmann,dye,planet eclipse,kingman,azodin,empire,municao paintball,hopper,loader,speedball,woodsball,hpa,co2 paintball,pod pack,barrel paintball,squeegee,chronograph,barrel sock,air tank,dragon paintball,eco field,airsoft,replica airsoft,aeg,gbb,m4 airsoft,ak47 airsoft,mp5 airsoft,sniper airsoft,pistol airsoft,g17,1911 airsoft,dmr,colete tatico,oculos airsoft,mascara airsoft,bbs,municao airsoft,carregador airsoft,coldre,cqb,milsim,hop up,gearbox,bota tatica,balaclava,speed loader,tracer,capacete airsoft,green gas,red dot,luneta airsoft,lanterna tatica,granada airsoft,bateria lipo,co2 12g,cx5,recarga co2,bolter,bolt action,camuflagem tatica"
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
          SHOPEE_MAX_OFFERS: "10"
          SHOPEE_KEYWORDS: "paintball,marcador paintball,mascara paintball,bola paintball,bolinha paintball,equipamento paintball,kit paintball,carregador paintball,cilindro co2,calca paintball,luva paintball,colete paintball,gatilho paintball,aguia paintball,spyder,tippmann,dye,planet eclipse,kingman,azodin,empire,municao paintball,hopper,loader,speedball,woodsball,hpa,co2 paintball,pod pack,barrel paintball,squeegee,chronograph,barrel sock,air tank,dragon paintball,eco field,airsoft,replica airsoft,aeg,gbb,m4 airsoft,ak47 airsoft,mp5 airsoft,sniper airsoft,pistol airsoft,g17,1911 airsoft,dmr,colete tatico,oculos airsoft,mascara airsoft,bbs,municao airsoft,carregador airsoft,coldre,cqb,milsim,hop up,gearbox,bota tatica,balaclava,speed loader,tracer,capacete airsoft,green gas,red dot,luneta airsoft,lanterna tatica,granada airsoft,bateria lipo,co2 12g,cx5,recarga co2,bolter,bolt action,camuflagem tatica"
